name: Build and Push Container Image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'app.py'
      - 'requirements.txt'

permissions:
  id-token: write
  contents: write

env:
  ACR_NAME: grouperdevacr001
  REGISTRY: grouperdevacr001.azurecr.io
  IMAGE_NAME: demo-app
  MANIFEST_PATH: apps/demo-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Image Tag
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}-r${GITHUB_RUN_NUMBER}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "Using image tag: $IMAGE_TAG"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name $ACR_NAME

      - name: Build Container Image
        run: |
          docker build \
            -t $REGISTRY/$IMAGE_NAME:$IMAGE_TAG \
            .

      - name: Push Container Image
        run: |
          docker push $REGISTRY/$IMAGE_NAME:$IMAGE_TAG

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Update Kustomization Image Tag
        run: |
          sed -i "s|newTag:.*|newTag: $IMAGE_TAG|g" \
            $MANIFEST_PATH/kustomization.yaml

          echo "Updated manifest:"
          cat $MANIFEST_PATH/kustomization.yaml

      - name: Commit Manifest Changes
        run: |
          git add $MANIFEST_PATH/kustomization.yaml

          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "[skip ci] Update image to $IMAGE_TAG"
          fi

      - name: Push Changes
        run: |
          git push origin main
