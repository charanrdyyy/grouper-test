name: Build and Push to ACR
 
on:
  push:
    branches:
      - main
 
permissions:
  id-token: write
  contents: read
 
env:
  ACR_NAME: grouperdevacr001
  REGISTRY: grouperdevacr001.azurecr.io
  IMAGE_NAME: demo-app
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
 
      - name: Set Image Tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}-r${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV
 
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
 
      - name: Login to ACR
        run: az acr login --name $ACR_NAME
 
      - name: Build Docker Image
        run: |
          docker build \
            -t $REGISTRY/$IMAGE_NAME:$IMAGE_TAG \
            .
 
      - name: Push Image
        run: |
          docker push $REGISTRY/$IMAGE_NAME:$IMAGE_TAG
 
      - name: Checkout GitOps Branch
        run: |
          git fetch origin gitops
          git checkout gitops
      
      - name: Update GitOps Image Tag
        run: |
          sed -i "s/newTag:.*/newTag: $IMAGE_TAG/" apps/demo-app/kustomization.yaml
          cat apps/demo-app/kustomization.yaml
      
      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
      
          git add apps/demo-app/kustomization.yaml
      
          git diff --staged --quiet || git commit -m "Deploy image $IMAGE_TAG"
      
          git push origin gitops
